<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Plugin Gazette – Archief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0f0eb; font-family:'DM Sans',sans-serif; color:#1a1a1a; padding:40px 20px; }
  .wrapper { max-width:680px; margin:0 auto; }
  .header { background:#1a1a1a; border-radius:4px 4px 0 0; padding:28px 36px; margin-bottom:2px; }
  .gazette-name { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#c8f135; margin-bottom:6px; }
  .header h1 { font-size:24px; font-weight:700; color:#fff; }
  .divider { height:3px; background:linear-gradient(90deg,#c8f135,#7c3aed,#06b6d4); margin-bottom:2px; }
  .card { background:#fff; border-radius:4px; padding:20px 28px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; text-decoration:none; color:#1a1a1a; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .card:hover { background:#f7fde8; }
  .card-left .week { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; margin-bottom:4px; }
  .card-left .title { font-size:15px; font-weight:600; }
  .card-left .date { font-size:12px; color:#888; margin-top:3px; font-family:'DM Mono',monospace; }
  .card-arrow { font-size:18px; color:#c8f135; }
  .card.current { border-left:3px solid #c8f135; }
  .card.current .week { color:#7c3aed; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="divider"></div>
  <div class="header">
    <div class="gazette-name">De Plugin Gazette</div>
    <h1>Archief</h1>
  </div>
  <div class="divider"></div>

  <div style="height:12px;"></div>

  <a href="index.html" class="card current" style="display:flex;text-decoration:none;color:#1a1a1a;">
    <div class="card-left">
      <div class="week">Week 11 · 2026 — Huidig</div>
      <div class="title">Weekrapport 13 maart 2026</div>
      <div class="date">Zat 7 mrt – vrij 13 mrt 2026</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <div style="padding:24px 0 8px; font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:1.5px; font-weight:700;">Vorige edities</div>
  <div style="background:#fff; border-radius:4px; padding:20px 28px; font-size:13px; color:#aaa; text-align:center;">
    Vorige edities verschijnen hier wanneer je een nieuw rapport uploadt als <code style="background:#f0f0eb;padding:2px 6px;border-radius:2px;">wk10.html</code>, <code style="background:#f0f0eb;padding:2px 6px;border-radius:2px;">wk09.html</code> enz.
  </div>
</div>
</body>
</html>
